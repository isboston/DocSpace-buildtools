name: Update README

on:
  push:
    paths:
      - '.github/workflows/ci-oci-install.yml'
    branches:
      - master
      - release/*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update OS list in README
        run: |
          set -euo pipefail

          FILE='.github/workflows/ci-oci-install.yml'

          # 1) Пытаемся вытащить JSON из env.OS_MAP шага "Set matrix names"
          OS_MAP_JSON=$(yq -r '.jobs.prepare.steps[] | select(.name == "Set matrix names") | .env.OS_MAP // ""' "$FILE" | tr -d '\r')

          if [ -n "$OS_MAP_JSON" ] && echo "$OS_MAP_JSON" | jq -e . >/dev/null 2>&1; then
            # ✓ Современный путь: читаем имена из OS_MAP (нулевой элемент массива)
            OS_LIST=$(printf '%s\n' "$OS_MAP_JSON" \
              | jq -r 'to_entries | map(.value[0])[]' \
              | sed '/^\s*$/d' \
              | awk 'NF{print "- "$0}')
          else
            # ↩︎ Fallback: старая логика — выдираем из текста .run
            RUN_BLOCK=$(yq -r '.jobs.prepare.steps[] | select(.name == "Set matrix names") | .run // ""' "$FILE" | tr -d '\r')

            # Пытаемся сначала JSON-формат: "name":"..."
            OS_LIST=$(printf '%s\n' "$RUN_BLOCK" \
              | grep -oP '"name"\s*:\s*"\K[^"]+' || true)

            # Если пусто — пробуем YAML-формат: name: ...
            if [ -z "$OS_LIST" ]; then
              OS_LIST=$(printf '%s\n' "$RUN_BLOCK" \
                | grep -oP '^\s*name\s*:\s*\K.*' || true)
            fi

            OS_LIST=$(printf '%s\n' "$OS_LIST" \
              | sed '/^\s*$/d' \
              | awk 'NF{print "- "$0}')
          fi

          if [ -z "$OS_LIST" ]; then
            echo "::error:: OS list is empty. Check OS_MAP or .run format" >&2
            exit 1
          fi

          { printf '<!-- OS-SUPPORT-LIST-START -->\n'
            printf '%s\n' "$OS_LIST"
            printf '<!-- OS-SUPPORT-LIST-END -->\n'
          } > os_block.tmp

          awk '
            BEGIN {in_block=0}
            /<!-- OS-SUPPORT-LIST-START -->/ {while ((getline line < "os_block.tmp")>0) print line; in_block=1; next}
            /<!-- OS-SUPPORT-LIST-END -->/   {in_block=0; next}
            !in_block {print}
          ' install/OneClickInstall/README.md > README.new \
          && mv README.new install/OneClickInstall/README.md
          rm -f os_block.tmp

      - name: Commit changes (if any)
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          if [ -n "$(git status --porcelain -- install/OneClickInstall/README.md)" ]; then
            git add install/OneClickInstall/README.md
            git commit -m "Update OS list in OCI README"
            git pull --rebase --autostash
            git push
          else
            echo "No changes to commit"
          fi
