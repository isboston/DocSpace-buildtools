name: Install OneClickInstall DocSpace

on:
  schedule:
    - cron: '00 20 * * 0'

  workflow_dispatch:
    inputs:
      os_list:
        description: "Comma-separated list of OS to test (e.g. debian11,ubuntu2404,rhel9)"
        required: false
        default: "rhel9,centos9s,debian11,debian12,ubuntu2204,ubuntu2404,fedora41,fedora42,amazon2023"

      deb_build:
        type: boolean
        description: "Run tests on DEB-based distros"
        default: true

      rpm_build:
        type: boolean
        description: "Run tests on RPM-based distros"
        default: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Set matrix names
      id: set-matrix
      run: |
        os_input="${{ github.event.inputs.os_list }}"
        IFS=',' read -ra selected <<< "$os_input"

        matrix_data='[
          {"name": "RHEL 9", "os": "rhel9", "distr": "generic"},
          {"name": "CentOS9s", "os": "base-centos9s", "distr": "onlyoffice"},
          {"name": "Debian11", "os": "base-debian11", "distr": "onlyoffice"},
          {"name": "Debian12", "os": "base-debian12", "distr": "onlyoffice"},
          {"name": "Ubuntu22.04", "os": "base-ubuntu2204", "distr": "onlyoffice"},
          {"name": "Ubuntu24.04", "os": "base-ubuntu2404", "distr": "onlyoffice"},
          {"name": "Fedora41", "os": "base-fedora41", "distr": "onlyoffice"},
          {"name": "Fedora42", "os": "base-fedora42", "distr": "onlyoffice"},
          {"name": "Amazon Linux 2023", "os": "amazonlinux-2023", "distr": "bento"}
        ]'

        selected_json=$(printf '%s\n' "${selected[@]}" | jq -R . | jq -s .)

        matrix=$(jq -c \
          --argjson selected "$selected_json" \
          --argjson debuild "${{ github.event.inputs.deb_build || true }}" \
          --argjson rpmbuild "${{ github.event.inputs.rpm_build || true }}" \
          '
          {include: [
            .[] | select(
              (.name | ascii_downcase | gsub(" "; "") | IN($selected[]))
              or ($debuild and (.name | test("Debian|Ubuntu")))
              or ($rpmbuild and (.name | test("CentOS|Fedora|RHEL|Amazon")))
            )
          ]}
          ' <<< "$matrix_data")

        echo "matrix=$matrix" >> $GITHUB_OUTPUT

  vagrant-up:
    name: "Test DocSpace with ${{ matrix.name}}"
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Checking scripts for errors"
        run: |
          set -eux
          sudo apt-get install -y shellcheck
          find install/OneClickInstall tests -type f -name "*.sh" ! -path "install/OneClickInstall/install-Docker.sh" \
            | xargs shellcheck --exclude="$(awk '!/^#|^$/ {print $1}' tests/lint/sc_ignore | paste -sd ",")" --severity=warning | tee sc_output
          awk '/\(warning\):/ {w++} /\(error\):/ {e++} END {if (w+e) printf "::warning ::ShellCheck detected %d warnings and %d errors\n", w+0, e+0}' sc_output

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get update and install vagrant
        run: |
          set -eux
          wget -q https://www.virtualbox.org/download/oracle_vbox_2016.asc -O- | sudo gpg --dearmor -o /usr/share/keyrings/virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(. /etc/os-release && echo $UBUNTU_CODENAME) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update -y
          sudo apt install vagrant virtualbox-7.0 -y

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force

      - name: "Test production scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'schedule' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 1
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--production-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{ matrix.os }}' \
            DOWNLOAD_SCRIPT='-ds true' \
            RAM='8192' \
            CPU='3' \
            ARGUMENTS="-arg '--skiphardwarecheck true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force

      - name: "Test Local scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 1
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--local-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{matrix.os}}' \
            RAM='8192' \
            CPU='3' \
            DOWNLOAD_SCRIPT='-ds false' \
            TEST_REPO='-tr true' \
            ARGUMENTS="-arg '--skiphardwarecheck true --localscripts true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force
