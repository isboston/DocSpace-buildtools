name: Install OneClickInstall DocSpace

on:
  workflow_dispatch:
    inputs:
      os_deb:
        description: |
          DEB-based distros:
          debian11, debian12, ubuntu2204, ubuntu2404
        required: false
        default: ""

      os_rpm:
        description: |
          RPM-based distros:
          rhel9, centos9s, fedora41, fedora42
        required: false
        default: ""

      all:
        type: boolean
        description: Enable all distros
        default: false

      deb_build:
        type: boolean
        description: Enable all DEB-based
        default: false

      rpm_build:
        type: boolean
        description: Enable all RPM-based
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - name: Build test matrix
        id: build
        env:
          OS_MAP: |
            {
              "rhel9":      ["RHEL 9",      "generic"],
              "centos9s":   ["CentOS 9 Stream", "onlyoffice"],
              "debian11":   ["Debian 11",   "onlyoffice"],
              "debian12":   ["Debian 12",   "onlyoffice"],
              "ubuntu2204": ["Ubuntu 22.04","onlyoffice"],
              "ubuntu2404": ["Ubuntu 24.04","onlyoffice"],
              "fedora41":   ["Fedora 41",   "onlyoffice"],
              "fedora42":   ["Fedora 42",   "onlyoffice"]
            }
        shell: bash
        run: |
          set -euo pipefail

          # Inputs
          ALL=${{ github.event.inputs.all || 'false' }}
          DEB_BUILD=${{ github.event.inputs.deb_build || 'false' }}
          RPM_BUILD=${{ github.event.inputs.rpm_build || 'false' }}
          OS_DEB="${{ github.event.inputs.os_deb }}"
          OS_RPM="${{ github.event.inputs.os_rpm }}"

          # Determine RAW_LIST
          if [[ "$ALL" == "true" ]]; then
            RAW_LIST=$(jq -r 'keys | join(",")' <<< "$OS_MAP")
          else
            RAW_LIST=""
            [[ -n "$OS_DEB" && "$DEB_BUILD" == "true" ]] && RAW_LIST+="${OS_DEB},"
            [[ -n "$OS_RPM" && "$RPM_BUILD" == "true" ]] && RAW_LIST+="${OS_RPM},"
            RAW_LIST="${RAW_LIST%,}"
          fi

          # If everything was empty or disabled, fallback to all
          if [[ -z "$RAW_LIST" ]]; then
            echo "::notice ::No distros selected — defaulting to all"
            RAW_LIST=$(jq -r 'keys | join(",")' <<< "$OS_MAP")
            DEB_BUILD=true
            RPM_BUILD=true
          fi

          # Build matrix from OS_MAP
          MATRIX=$(jq -cn --arg map "$OS_MAP" --arg raw "$RAW_LIST" '
            ($map|fromjson) as $m |
            ($raw|split(",")|map(select(length>0))) as $ids |
            {include: $ids|map(select($m[.]?) | {name:$m[.][0], os:., distr:$m[.][1]})}
          ')

          # Final filtering by deb/rpm toggle
          MATRIX=$(jq --argjson deb "$DEB_BUILD" --argjson rpm "$RPM_BUILD" '
            .include |= map(select(
              ($deb and (.name | test("Debian|Ubuntu"))) or
              ($rpm and (.name | test("CentOS|Fedora|RHEL")))
            ))' <<< "$MATRIX")

          echo "matrix=$(jq -c <<< "$MATRIX")" >> "$GITHUB_OUTPUT"

  vagrant-up:
    name: "Test DocSpace with ${{ matrix.name}}"
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Checking scripts for errors"
        run: |
          set -eux
          sudo apt-get install -y shellcheck
          find install/OneClickInstall tests -type f -name "*.sh" ! -path "install/OneClickInstall/install-Docker.sh" \
            | xargs shellcheck --exclude="$(awk '!/^#|^$/ {print $1}' tests/lint/sc_ignore | paste -sd ",")" --severity=warning | tee sc_output
          awk '/\(warning\):/ {w++} /\(error\):/ {e++} END {if (w+e) printf "::warning ::ShellCheck detected %d warnings and %d errors\n", w+0, e+0}' sc_output

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get update and install vagrant
        run: |
          set -eux
          wget -q https://www.virtualbox.org/download/oracle_vbox_2016.asc -O- | sudo gpg --dearmor -o /usr/share/keyrings/virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(. /etc/os-release && echo $UBUNTU_CODENAME) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update -y
          sudo apt install vagrant virtualbox-7.0 -y

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force

      - name: "Test production scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'schedule' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--production-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{ matrix.os }}' \
            DOWNLOAD_SCRIPT='-ds true' \
            RAM='8192' \
            CPU='3' \
            ARGUMENTS="-arg '--skiphardwarecheck true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force

      - name: "Test Local scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--local-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{matrix.os}}' \
            RAM='8192' \
            CPU='3' \
            DOWNLOAD_SCRIPT='-ds false' \
            TEST_REPO='-tr true' \
            ARGUMENTS="-arg '--skiphardwarecheck true --localscripts true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force
