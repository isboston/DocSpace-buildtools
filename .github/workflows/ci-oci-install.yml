name: Install OneClickInstall DocSpace

on:
  workflow_dispatch:
    inputs:
      os_deb:
        description: |
          DEB-based distros:
          debian11,debian12,ubuntu2204,ubuntu2404
        required: false
        default: ""

      os_rpm:
        description: |
          RPM-based distros:
          rhel9,centos9s,fedora41,fedora42
        required: false
        default: ""

      all:
        type: boolean
        description: Select all distros
        default: false

      deb_build:
        type: boolean
        description: Select all DEB-based distros
        default: false

      rpm_build:
        type: boolean
        description: Select all RPM-based distros
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - name: Build test matrix
        id: build
        env:
          OS_MAP: |
            {
              "rhel9":      ["RHEL 9",           "generic"],
              "centos9s":   ["CentOS 9 Stream",  "onlyoffice"],
              "debian11":   ["Debian 11",        "onlyoffice"],
              "debian12":   ["Debian 12",        "onlyoffice"],
              "ubuntu2204": ["Ubuntu 22.04",     "onlyoffice"],
              "ubuntu2404": ["Ubuntu 24.04",     "onlyoffice"],
              "fedora41":   ["Fedora 41",        "onlyoffice"],
              "fedora42":   ["Fedora 42",        "onlyoffice"]
            }
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::[Debug inputs]"
          echo "all = ${{ github.event.inputs.all }}"
          echo "deb_build = ${{ github.event.inputs.deb_build }}"
          echo "rpm_build = ${{ github.event.inputs.rpm_build }}"
          echo "os_deb = '${{ github.event.inputs.os_deb }}'"
          echo "os_rpm = '${{ github.event.inputs.os_rpm }}'"
          echo "::endgroup::"

          ALL="${{ github.event.inputs.all || 'false' }}"
          DEB_BUILD="${{ github.event.inputs.deb_build || 'false' }}"
          RPM_BUILD="${{ github.event.inputs.rpm_build || 'false' }}"
          OS_DEB="${{ github.event.inputs.os_deb }}"
          OS_RPM="${{ github.event.inputs.os_rpm }}"

          RAW_LIST=()
          declare -A IS_MANUAL=()

          if [[ "$ALL" == "true" ]]; then
            echo "::notice ::all=true → enabling all distros"
            RAW_LIST=( $(jq -r 'keys_unsorted[]' <<< "$OS_MAP") )
            DEB_BUILD=true
            RPM_BUILD=true
          else
            if [[ -n "$OS_DEB" ]]; then
              IFS=',' read -ra arr <<< "$OS_DEB"
              for os in "${arr[@]}"; do
                RAW_LIST+=("$os")
                IS_MANUAL["$os"]=true
              done
            elif [[ "$DEB_BUILD" == "true" ]]; then
              for os in debian11 debian12 ubuntu2204 ubuntu2404; do
                RAW_LIST+=("$os")
              done
            fi

            if [[ -n "$OS_RPM" ]]; then
              IFS=',' read -ra arr <<< "$OS_RPM"
              for os in "${arr[@]}"; do
                RAW_LIST+=("$os")
                IS_MANUAL["$os"]=true
              done
            elif [[ "$RPM_BUILD" == "true" ]]; then
              for os in rhel9 centos9s fedora41 fedora42; do
                RAW_LIST+=("$os")
              done
            fi
          fi

          if [[ ${#RAW_LIST[@]} -eq 0 ]]; then
            echo "::notice ::Nothing selected — fallback to full matrix"
            RAW_LIST=( $(jq -r 'keys_unsorted[]' <<< "$OS_MAP") )
            DEB_BUILD=true
            RPM_BUILD=true
          fi

          echo "::group::[RAW_LIST]"
          printf "%s\n" "${RAW_LIST[@]}"
          echo "::endgroup::"

          jq_input="{\"include\":["
          for os in "${RAW_LIST[@]}"; do
            name=$(jq -r --arg os "$os" '.[$os][0]' <<< "$OS_MAP")
            distr=$(jq -r --arg os "$os" '.[$os][1]' <<< "$OS_MAP")
            manual_flag="false"
            [[ "${IS_MANUAL[$os]+isset}" ]] && manual_flag="true"
            jq_input+='{"name":"'"$name"'","os":"'"$os"'","distr":"'"$distr"'","manual":'"$manual_flag"'},'
          done
          jq_input="${jq_input%,}]}"

          echo "::group::[MATRIX before filtering]"
          echo "$jq_input" | jq
          echo "::endgroup::"

          MATRIX=$(jq --argjson deb "$DEB_BUILD" --argjson rpm "$RPM_BUILD" '
            .include |= map(select(
              .manual == true or
              (
                (.name | test("Debian|Ubuntu")) and $deb
              ) or (
                (.name | test("CentOS|Fedora|RHEL")) and $rpm
              )
            ))' <<< "$jq_input")

          echo "::group::[MATRIX after filtering]"
          echo "$MATRIX" | jq
          echo "::endgroup::"

          if [[ "$(jq '.include | length' <<< "$MATRIX")" -eq 0 ]]; then
            echo "::error ::Matrix is empty after filtering. Check your inputs."
            exit 1
          fi

          echo "matrix=$(jq -c <<< "$MATRIX")" >> "$GITHUB_OUTPUT"

  vagrant-up:
    name: "Test DocSpace with ${{ matrix.name}}"
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Checking scripts for errors"
        run: |
          set -eux
          sudo apt-get install -y shellcheck
          find install/OneClickInstall tests -type f -name "*.sh" ! -path "install/OneClickInstall/install-Docker.sh" \
            | xargs shellcheck --exclude="$(awk '!/^#|^$/ {print $1}' tests/lint/sc_ignore | paste -sd ",")" --severity=warning | tee sc_output
          awk '/\(warning\):/ {w++} /\(error\):/ {e++} END {if (w+e) printf "::warning ::ShellCheck detected %d warnings and %d errors\n", w+0, e+0}' sc_output

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get update and install vagrant
        run: |
          set -eux
          wget -q https://www.virtualbox.org/download/oracle_vbox_2016.asc -O- | sudo gpg --dearmor -o /usr/share/keyrings/virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(. /etc/os-release && echo $UBUNTU_CODENAME) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update -y
          sudo apt install vagrant virtualbox-7.0 -y

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force

      - name: "Test production scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'schedule' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--production-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{ matrix.os }}' \
            DOWNLOAD_SCRIPT='-ds true' \
            RAM='8192' \
            CPU='3' \
            ARGUMENTS="-arg '--skiphardwarecheck true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force

      - name: "Test Local scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--local-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{matrix.os}}' \
            RAM='8192' \
            CPU='3' \
            DOWNLOAD_SCRIPT='-ds false' \
            TEST_REPO='-tr true' \
            ARGUMENTS="-arg '--skiphardwarecheck true --localscripts true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force
