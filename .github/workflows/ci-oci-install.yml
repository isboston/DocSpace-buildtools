name: Install OneClickInstall DocSpace

on:
  schedule:
    - cron: '00 20 * * 0'

  workflow_dispatch:
    inputs:
      os_list:             # <— один параметр вместо восьми
        description: >-
          Кома-разделённый список дистрибутивов
          (например: "rhel9,ubuntu2204") или "all"
        required: false
        default: "all"

      deb_build:
        type: boolean
        description: "Run tests on DEB-based distros"
        default: true

      rpm_build:
        type: boolean
        description: "Run tests on RPM-based distros"
        default: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Set matrix
        id: set-matrix
        env:
          # Полный список поддерживаемых дистрибутивов
          ALL_OSES: >-
            rhel9 centos9s
            debian11 debian12
            ubuntu2204 ubuntu2404
            fedora41 fedora42
        run: |
          # 1. Разбираем переданные пользователем ОС
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_LIST="${{ github.event.inputs.os_list }}"
          else   # для schedule, push и т.д.
            RAW_LIST="all"
          fi

          if [[ -z "$RAW_LIST" || "$RAW_LIST" == "all" ]]; then
            SELECTED=($ALL_OSES)
          else
            IFS=',' read -ra SELECTED <<< "$RAW_LIST"
          fi

          # 2. Формируем JSON-массив include
          INCLUDE_JSON="[]"
          for os in "${SELECTED[@]}"; do
            case "$os" in
              rhel9)       NAME="RHEL 9";          DISTR="generic"      ;;
              centos9s)    NAME="CentOS9s";        DISTR="onlyoffice"   ;;
              debian11)    NAME="Debian11";        DISTR="onlyoffice"   ;;
              debian12)    NAME="Debian12";        DISTR="onlyoffice"   ;;
              ubuntu2204)  NAME="Ubuntu22.04";     DISTR="onlyoffice"   ;;
              ubuntu2404)  NAME="Ubuntu24.04";     DISTR="onlyoffice"   ;;
              fedora41)    NAME="Fedora41";        DISTR="onlyoffice"   ;;
              fedora42)    NAME="Fedora42";        DISTR="onlyoffice"   ;;
              *) echo "::warning ::Unknown OS '$os' — пропускаю"; continue ;;
            esac
            INCLUDE_JSON=$(jq --arg n "$NAME" --arg o "$os" --arg d "$DISTR" \
              '. + [{name:$n, os:$o, distr:$d}]' <<< "$INCLUDE_JSON")
          done

          # 3. Отфильтровываем по deb_build / rpm_build
          DEB=${{ github.event.inputs.deb_build  || 'true' }}
          RPM=${{ github.event.inputs.rpm_build  || 'true' }}

          MATRIX=$(jq -c --argjson deb "$DEB" --argjson rpm "$RPM" \
            '{include: [.[] | select(
              ($deb and (.name | test("Debian|Ubuntu"))) or
              ($rpm and (.name | test("CentOS|Fedora|RHEL")))
            )]}' <<< "$INCLUDE_JSON")

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"


  vagrant-up:
    name: "Test DocSpace with ${{ matrix.name}}"
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Checking scripts for errors"
        run: |
          set -eux
          sudo apt-get install -y shellcheck
          find install/OneClickInstall tests -type f -name "*.sh" ! -path "install/OneClickInstall/install-Docker.sh" \
            | xargs shellcheck --exclude="$(awk '!/^#|^$/ {print $1}' tests/lint/sc_ignore | paste -sd ",")" --severity=warning | tee sc_output
          awk '/\(warning\):/ {w++} /\(error\):/ {e++} END {if (w+e) printf "::warning ::ShellCheck detected %d warnings and %d errors\n", w+0, e+0}' sc_output

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get update and install vagrant
        run: |
          set -eux
          wget -q https://www.virtualbox.org/download/oracle_vbox_2016.asc -O- | sudo gpg --dearmor -o /usr/share/keyrings/virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(. /etc/os-release && echo $UBUNTU_CODENAME) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update -y
          sudo apt install vagrant virtualbox-7.0 -y

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force

      - name: "Test production scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'schedule' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--production-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{ matrix.os }}' \
            DOWNLOAD_SCRIPT='-ds true' \
            RAM='8192' \
            CPU='3' \
            ARGUMENTS="-arg '--skiphardwarecheck true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force

      - name: "Test Local scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--local-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{matrix.os}}' \
            RAM='8192' \
            CPU='3' \
            DOWNLOAD_SCRIPT='-ds false' \
            TEST_REPO='-tr true' \
            ARGUMENTS="-arg '--skiphardwarecheck true --localscripts true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force
