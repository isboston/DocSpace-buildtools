name: Install OneClickInstall DocSpace

on:
  schedule:
    - cron: '00 20 * * 0'

  workflow_dispatch:
    inputs:
      target_set:
        description: 'Выберите группу ОС: all, deb-only, rpm-only, custom'
        required: true
        default: 'all'
      custom_json:
        description: 'Только если выбран custom: JSON-массив, например ["debian11","ubuntu2204"]'
        required: false
      deb_build:
        type: boolean
        description: 'Запускать DEB-семейство'
        default: true
      rpm_build:
        type: boolean
        description: 'Запускать RPM-семейство'
        default: true


jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          # 0. Входные параметры
          target_set="${{ github.event.inputs.target_set }}"
          custom_json="${{ github.event.inputs.custom_json }}"
          deb='${{ github.event.inputs.deb_build }}'
          rpm='${{ github.event.inputs.rpm_build }}'

          case "$target_set" in
            all)
              want='["all"]'
              ;;
            deb-only)
              want='["all"]'
              rpm=false
              ;;
            rpm-only)
              want='["all"]'
              deb=false
              ;;
            custom)
              if [[ -n "$custom_json" ]]; then
                # Проверка: если это валидный JSON-массив — используем
                if echo "$custom_json" | jq empty 2>/dev/null; then
                  want="$custom_json"
                else
                  # Обернём одиночное значение в массив: "debian11" → ["debian11"]
                  want=$(jq -c --arg val "$custom_json" '[$val]')
                fi
              else
                want='["all"]'
              fi
              ;;
            *)
              echo "::error ::Unknown target_set=$target_set"
              exit 1
              ;;
          esac


          # 2. Каталог
          cat > /tmp/catalog.json <<'JSON'
          [
            {"name":"RHEL 9",      "os":"rhel9",          "distr":"generic",    "family":"rpm"},
            {"name":"CentOS 9s",   "os":"base-centos9s",  "distr":"onlyoffice", "family":"rpm"},
            {"name":"Debian 11",   "os":"base-debian11",  "distr":"onlyoffice", "family":"deb"},
            {"name":"Debian 12",   "os":"base-debian12",  "distr":"onlyoffice", "family":"deb"},
            {"name":"Ubuntu 22.04","os":"base-ubuntu2204","distr":"onlyoffice", "family":"deb"},
            {"name":"Ubuntu 24.04","os":"base-ubuntu2404","distr":"onlyoffice", "family":"deb"},
            {"name":"Fedora 41",   "os":"base-fedora41",  "distr":"onlyoffice", "family":"rpm"},
            {"name":"Fedora 42",   "os":"base-fedora42",  "distr":"onlyoffice", "family":"rpm"}
          ]
          JSON

          # 3. Фильтрация
          sel=$(jq -n \
              --slurpfile all /tmp/catalog.json \
              --argjson want "$want" \
              --argjson deb "$deb" \
              --argjson rpm "$rpm" '
            ($all[0]) |
            map(select(
              ($want | index("all")) or
              (.os as $o | $want | index($o))
            )) |
            map(select(
              ($deb and .family == "deb") or
              ($rpm and .family == "rpm")
            ))')

          echo "matrix={\"include\":$sel}" >> "$GITHUB_OUTPUT"


  vagrant-up:
    name: "Test DocSpace with ${{ matrix.name}}"
    runs-on: ubuntu-22.04
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Checking scripts for errors"
        run: |
          set -eux
          sudo apt-get install -y shellcheck
          find install/OneClickInstall tests -type f -name "*.sh" ! -path "install/OneClickInstall/install-Docker.sh" \
            | xargs shellcheck --exclude="$(awk '!/^#|^$/ {print $1}' tests/lint/sc_ignore | paste -sd ",")" --severity=warning | tee sc_output
          awk '/\(warning\):/ {w++} /\(error\):/ {e++} END {if (w+e) printf "::warning ::ShellCheck detected %d warnings and %d errors\n", w+0, e+0}' sc_output

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get update and install vagrant
        run: |
          set -eux
          wget -q https://www.virtualbox.org/download/oracle_vbox_2016.asc -O- | sudo gpg --dearmor -o /usr/share/keyrings/virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(. /etc/os-release && echo $UBUNTU_CODENAME) contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update -y
          sudo apt install vagrant virtualbox-7.0 -y

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force

      - name: "Test production scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'schedule' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--production-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{ matrix.os }}' \
            DOWNLOAD_SCRIPT='-ds true' \
            RAM='8192' \
            CPU='3' \
            ARGUMENTS="-arg '--skiphardwarecheck true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force

      - name: "Test Local scripts with ${{matrix.name}}"
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 80
          retry_on: error
          command: |
            set -eux
            cd tests/vagrant
            TEST_CASE='--local-install' \
            DISTR='${{ matrix.distr }}' \
            OS='${{matrix.os}}' \
            RAM='8192' \
            CPU='3' \
            DOWNLOAD_SCRIPT='-ds false' \
            TEST_REPO='-tr true' \
            ARGUMENTS="-arg '--skiphardwarecheck true --localscripts true'" \
            vagrant up --provider=virtualbox
          on_retry_command: |
            echo "RUN CLEAN UP: Destroy vagrant and one more try"
            cd tests/vagrant
            sleep 10
            vagrant destroy --force
